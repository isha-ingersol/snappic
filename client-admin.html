<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NAME — Client Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F4F3EF;--ink:#141412;--mu:#8A8A82;
  --bl:#2246D4;--bll:#EEF1FD;
  --gr:#1A7A42;--grl:#E8F5EE;
  --re:#C41C1C;--rel:#FDEAEA;
  --am:#B45309;--aml:#FDF5E6;
  --pu:#6D28D9;--pul:#F3EFFD;
  --or:#C2410C;--orl:#FDF0EB;
  --bd:#E2E1DC;--ca:#FFF;
  --dk:#0C0E1A;--dk2:#141828;
  --mn:'DM Mono',monospace;--sf:'Sora',sans-serif;
}
html,body{height:100%;}
body{font-family:var(--sf);color:var(--ink);background:var(--dk);display:flex;flex-direction:column;min-height:100svh;}

/* SHELL */
.shell{background:#080A14;border-bottom:1px solid #1A1F35;padding:0 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;height:42px;flex-shrink:0;}
.s-logo{font-family:var(--mn);font-size:11px;font-weight:500;color:#93C5FD;letter-spacing:.14em;flex-shrink:0;}

/* VIEW */
.view{display:flex;flex-direction:column;height:calc(100svh - 42px);}

/* SCREEN NAV */
.snav{background:#080A14;border-bottom:1px solid #1A1F35;padding:6px 12px;display:flex;gap:2px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;}
.snav::-webkit-scrollbar{display:none;}
.sn{font-family:var(--mn);font-size:8px;letter-spacing:.04em;padding:4px 8px;border-radius:4px;cursor:pointer;color:#475569;border:none;background:transparent;text-transform:uppercase;white-space:nowrap;transition:all .12s;}
.sn:hover{color:#94A3B8;background:#141828;}
.sn.on{background:#192D5A;color:#93C5FD;}
.snav .sep{width:1px;background:#1A1F35;margin:0 3px;flex-shrink:0;}

/* CANVASES */
.wcanvas{flex:1;overflow-y:auto;padding:14px;background:#0A0C18;display:flex;justify-content:flex-start;align-items:flex-start;}

/* WEB FRAME */
.wf{background:var(--ca);border:1.5px solid var(--bd);border-radius:10px;overflow:visible;width:100%;max-width:900px;box-shadow:0 4px 24px rgba(0,0,0,.14);}
.wch{background:#EDECEA;border-bottom:1px solid var(--bd);padding:7px 12px;display:flex;align-items:center;gap:8px;}
.dot{width:10px;height:10px;border-radius:50%;}
.dr{background:#FF5F57;}.dy{background:#FEBC2E;}.dg{background:#28C840;}
.wu{flex:1;background:#fff;border-radius:4px;padding:3px 10px;font-size:9px;font-family:var(--mn);color:var(--mu);}

/* APP NAV */
.anav{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--bd);}
.anavbrand{font-family:var(--mn);font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;}
.anavlogo{width:24px;height:24px;border-radius:6px;background:var(--bl);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;}
.anavlinks{display:flex;gap:18px;}
.anl{font-size:11px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;padding-bottom:1px;transition:all .15s;}
.anl:hover,.anl.on{color:var(--ink);font-weight:600;border-color:var(--bl);}
.anavr{display:flex;gap:8px;align-items:center;}
.avt{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--bl),var(--pu));cursor:pointer;}

/* ATOMS */
.wc{padding:20px;}
.h2{font-size:18px;font-weight:700;letter-spacing:-.02em;}
.h3{font-size:13px;font-weight:600;}
.mu{font-size:11px;color:var(--mu);line-height:1.5;}
.lbl{font-family:var(--mn);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--bd);border-radius:7px;padding:9px 12px;font-size:11px;color:var(--ink);font-family:var(--sf);outline:none;}
.inp::placeholder{color:var(--mu);}
.card{background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;padding:14px;}
.hr{height:1px;background:var(--bd);margin:12px 0;}
.upl{border:2px dashed var(--bd);border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;background:var(--bg);padding:16px;cursor:pointer;transition:all .15s;}
.upl:hover{border-color:var(--bl);background:var(--bll);}

/* PILLS */
.p{display:inline-flex;align-items:center;font-family:var(--mn);font-size:8px;padding:2px 7px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
.pb{background:var(--bll);color:var(--bl);border:1px solid #A5B4FC;}
.pg{background:var(--grl);color:var(--gr);border:1px solid #86EFAC;}
.pr{background:var(--rel);color:var(--re);border:1px solid #FCA5A5;}
.pa{background:var(--aml);color:var(--am);border:1px solid #FCD34D;}
.pp{background:var(--pul);color:var(--pu);border:1px solid #C4B5FD;}
.pgr{background:#F1F5F9;color:var(--mu);border:1px solid var(--bd);}
.po{background:var(--orl);color:var(--or);border:1px solid #FCA5A5;}

/* BTNS */
.btn{font-size:11px;font-weight:600;padding:9px 16px;border-radius:7px;background:var(--bl);color:#fff;cursor:pointer;transition:opacity .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:hover{opacity:.87;}
.bgh{background:transparent;border:1.5px solid var(--bd);color:var(--ink);}
.bgr{background:var(--gr);}
.bre{background:var(--re);}
.bfu{width:100%;}
.wbtn{font-size:10px;font-weight:600;padding:6px 13px;border-radius:6px;background:var(--bl);color:#fff;cursor:pointer;}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}

/* TABS */
.ptabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px;overflow-x:auto;gap:0;}
.ptabs::-webkit-scrollbar{display:none;}
.ptab{font-size:11px;font-weight:600;padding:8px 14px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s;}
.ptab.on{color:var(--bl);border-color:var(--bl);}

/* TOGGLE */
.tog{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);}
.tog:last-child{border-bottom:none;}
.tinf{flex:1;margin-right:12px;}
.tlbl{font-size:11px;font-weight:600;}
.tsub{font-size:10px;color:var(--mu);margin-top:2px;}
.sw{width:34px;height:20px;border-radius:10px;background:var(--bd);position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
.sw.on{background:var(--bl);}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.sw.on::after{transform:translateX(14px);}

/* FILTER */
.fp{font-family:var(--mn);font-size:9px;padding:4px 10px;border-radius:20px;cursor:pointer;border:1.5px solid var(--bd);color:var(--mu);background:transparent;transition:all .15s;white-space:nowrap;}
.fp.on{background:var(--bl);color:#fff;border-color:var(--bl);}

/* PHOTO ROW */
.pr-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1.5px solid var(--bd);border-radius:9px;margin-bottom:7px;cursor:pointer;transition:border-color .15s;}
.pr-row:hover{border-color:var(--bl);}
.pr-row.flag{border-color:var(--re);background:var(--rel);}
.thumb{width:46px;height:46px;border-radius:8px;flex-shrink:0;overflow:hidden;position:relative;}

/* TOAST & MODAL */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:11px;font-family:var(--mn);padding:9px 16px;border-radius:8px;z-index:9999;opacity:0;transition:opacity .28s;pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.on{opacity:1;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:5000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.mo.hid{display:none;}
.mb{background:#fff;border-radius:16px 16px 0 0;padding:22px;width:100%;max-width:500px;max-height:88svh;overflow-y:auto;position:relative;}
.mb.w{max-width:620px;}
@media(min-width:700px){.mo{align-items:center;padding:20px;}.mb{border-radius:16px;max-height:72svh;}}
.mc{position:absolute;top:12px;right:14px;font-size:20px;cursor:pointer;color:var(--mu);}

/* GIF */
@keyframes bf1{0%,14%{opacity:1;}16%,83%{opacity:0;}86%,98%{opacity:1;}100%{opacity:0;}}
@keyframes bf2{0%,15%{opacity:0;}17%,31%{opacity:1;}33%,68%{opacity:0;}70%,84%{opacity:1;}86%,100%{opacity:0;}}
@keyframes bf3{0%,32%{opacity:0;}34%,48%{opacity:1;}50%,53%{opacity:0;}55%,69%{opacity:1;}71%,100%{opacity:0;}}
@keyframes bf4{0%,49%{opacity:0;}51%,64%{opacity:1;}66%,100%{opacity:0;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="shell">
  <div class="s-logo">NAME · CLIENT ADMIN</div>
</div>

<div class="view on">
  <div class="wcanvas" id="ca-c"></div>
</div>

<div class="toast" id="toast"></div>
<div class="mo hid" id="mo" onclick="closeMbg(event)">
  <div class="mb" id="mb" style="position:relative;"></div>
</div>

<script>
/* ── GLOBALS ── */
const FC=['#1A237E','#991B1B','#92400E','#14532D'];
let currentEvent = {name:'', isNew:false};

/* ── UTILS ── */
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2300);}
function openM(h,wide=false){const b=$('mb');b.className='mb'+(wide?' w':'');b.innerHTML=h;$('mo').classList.remove('hid');}
function closeM(){$('mo').classList.add('hid');}
function closeMbg(e){if(e.target===$('mo'))closeM();}
function tog(el){el.classList.toggle('on');}
function togSw(el){el.classList.toggle('on');}

function wframe(url,c){
  return `<div class="wf"><div class="wch"><div style="display:flex;gap:4px;"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div><div class="wu">${url}</div></div>${c}</div>`;
}
function anav(brand,links,active,extra='',profileFn){
  const ls=links.map(([id,lbl,sc])=>`<span class="anl ${active===id?'on':''}" onclick="showCA('${id}',null)">${lbl}</span>`).join('');
  return `<div class="anav"><div class="anavbrand"><div class="anavlogo">${brand[0]}</div>${brand}</div><div class="anavlinks">${ls}</div><div class="anavr">${extra}<div class="avt" onclick="${profileFn}"></div></div></div>`;
}
function stars(r=0,sz=12){
  return `<div style="display:flex;gap:2px;">${[1,2,3,4,5].map(n=>`<svg width="${sz}" height="${sz}" viewBox="0 0 20 20" fill="${n<=r?'#F59E0B':'#D1D5DB'}"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`).join('')}</div>`;
}

/* ── CLIENT ADMIN ── */
function showCA(s,btn){
  document.querySelectorAll('.sn').forEach(b=>b.classList.remove('on'));
  btn?.classList.add('on');renderCA(s);
}
function renderCA(s){
  const c=$('ca-c');if(!c)return;
  const m={login:caLogin,dash:caDash,setup:caSetup,roles:caRoles,sharing:caSharing,survey:caSurvey,analytics:caAnalytics,profile:caProfile,managers:caManagers};
  c.innerHTML=`<div style="width:100%;max-width:900px;">${(m[s]||caLogin)()}</div>`;
}

const caN=(a)=>anav('NAME Client',[['dash','My Events','CA'],['analytics','Analytics','CA'],['managers','Managers','CA']],a,`<div class="wbtn" onclick="openEvent('')" style="margin-right:6px;">+ New Event</div>`,"showCA('profile',null)");

function caProfile(){return wframe('app.NAME.com/client/profile',caN('profile')+`
<div class="wc">
  <div class="h2" style="margin-bottom:20px;">Account Settings</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <div>
      <div class="card" style="margin-bottom:14px;">
        <div class="h3" style="margin-bottom:14px;">Profile</div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
          <div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--bl),var(--pu));flex-shrink:0;cursor:pointer;" onclick="toast('Upload photo')"></div>
          <div><div style="font-size:12px;font-weight:700;">Sarah Miller</div><div class="mu" style="font-size:10px;margin-top:2px;">sarah@companya.com</div></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div class="g2"><div><div class="lbl">First name</div><input class="inp" style="margin-top:4px;" value="Sarah"/></div><div><div class="lbl">Last name</div><input class="inp" style="margin-top:4px;" value="Miller"/></div></div>
          <div><div class="lbl">Email</div><input class="inp" style="margin-top:4px;" value="sarah@companya.com" type="email"/></div>
          <div><div class="lbl">Company</div><input class="inp" style="margin-top:4px;" value="Company A"/></div>
          <div class="btn bfu" style="border-radius:8px;" onclick="toast('Profile saved ✓')">Save Changes</div>
        </div>
      </div>
      <div class="card">
        <div class="h3" style="margin-bottom:14px;">Security</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div><div class="lbl">Current password</div><input class="inp" style="margin-top:4px;" type="password" placeholder="••••••••"/></div>
          <div><div class="lbl">New password</div><input class="inp" style="margin-top:4px;" type="password" placeholder="••••••••"/></div>
          <div class="btn bgh bfu" style="border-radius:8px;" onclick="toast('Password updated ✓')">Update Password</div>
        </div>
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:14px;">
        <div class="h3" style="margin-bottom:14px;">Notifications</div>
        <div style="display:flex;flex-direction:column;">
          <div class="tog"><div class="tinf"><div class="tlbl">Event goes live</div><div class="tsub">Notify when booth is launched</div></div><div class="sw on" onclick="togSw(this)"></div></div>
          <div class="tog"><div class="tinf"><div class="tlbl">New photo milestones</div><div class="tsub">At 50, 100, 500 photos</div></div><div class="sw on" onclick="togSw(this)"></div></div>
          <div class="tog"><div class="tinf"><div class="tlbl">Share activity</div><div class="tsub">When attendees share their photo</div></div><div class="sw" onclick="togSw(this)"></div></div>
          <div class="tog"><div class="tinf"><div class="tlbl">Privacy flags</div><div class="tsub">Unusual sharing patterns detected</div></div><div class="sw on" onclick="togSw(this)"></div></div>
          <div class="tog"><div class="tinf"><div class="tlbl">Survey responses</div><div class="tsub">Daily digest of survey feedback</div></div><div class="sw" onclick="togSw(this)"></div></div>
          <div class="tog"><div class="tinf"><div class="tlbl">Weekly analytics report</div><div class="tsub">Every Monday by email</div></div><div class="sw on" onclick="togSw(this)"></div></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:14px;">
        <div class="h3" style="margin-bottom:14px;">Preferences</div>
        <div style="display:flex;flex-direction:column;">
          <div class="tog"><div class="tinf"><div class="tlbl">Dark mode</div><div class="tsub">Use dark theme in dashboard</div></div><div class="sw" onclick="togSw(this)"></div></div>
          <div class="tog"><div class="tinf"><div class="tlbl">Compact view</div><div class="tsub">Show more events per page</div></div><div class="sw" onclick="togSw(this)"></div></div>
          <div class="tog"><div class="tinf"><div class="tlbl">Show tutorial tips</div><div class="tsub">Helpful hints for new features</div></div><div class="sw on" onclick="togSw(this)"></div></div>
        </div>
      </div>
      <div class="btn bgh bfu" style="border-radius:8px;border-color:var(--re);color:var(--re);" onclick="showCA('login',null);toast('Signed out')">Sign Out</div>
    </div>
  </div>
</div>`);}

function caLogin(){return wframe('app.NAME.com/client/login',`
<div class="wc" style="max-width:380px;margin:40px auto;">
  <div style="text-align:center;margin-bottom:24px;"><div class="lbl" style="color:var(--bl);margin-bottom:6px;">Client Admin</div><div class="h2">Sign in</div><div class="mu" style="margin-top:4px;">Manage your events &amp; experiences</div></div>
  <div style="display:flex;border:1.5px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:16px;">
    <div id="ca-tpw" style="flex:1;text-align:center;padding:8px;font-size:11px;font-weight:600;background:var(--bl);color:#fff;cursor:pointer;" onclick="caLM('pw')">Email &amp; Password</div>
    <div id="ca-tco" style="flex:1;text-align:center;padding:8px;font-size:11px;font-weight:600;background:transparent;color:var(--mu);cursor:pointer;" onclick="caLM('code')">Invite Code</div>
  </div>
  <div id="ca-pw" style="display:flex;flex-direction:column;gap:12px;">
    <div><div class="lbl">Email</div><input class="inp" style="margin-top:4px;" placeholder="you@company.com" type="email"/></div>
    <div><div class="lbl">Password</div><input class="inp" style="margin-top:4px;" placeholder="••••••••" type="password"/></div>
    <div class="btn bfu" style="border-radius:8px;padding:11px;" onclick="showCA('dash',null)">Sign In</div>
  </div>
  <div id="ca-co" style="display:none;flex-direction:column;gap:12px;">
    <div><div class="lbl">8-digit invite code</div><div style="display:flex;gap:5px;margin-top:6px;">${[...'CA284917'].map(ch=>`<div style="flex:1;aspect-ratio:1;background:#fff;border:2px solid var(--bd);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;font-family:var(--mn);">${ch}</div>`).join('')}</div></div>
    <div class="btn bfu" style="border-radius:8px;padding:11px;" onclick="showCA('register',null)">Verify Code →</div>
    <div style="text-align:center;font-size:10px;color:var(--mu);margin-top:4px;">First time? You'll set up your account after verifying.</div>
  </div>
</div>`);} 
function caLM(m){const p=m==='pw';['ca-tpw','ca-tco'].forEach((id,i)=>{const el=document.getElementById(id);if(el){el.style.background=((i===0&&p)||(i===1&&!p))?'var(--bl)':'transparent';el.style.color=((i===0&&p)||(i===1&&!p))?'#fff':'var(--mu)';}});const pw=document.getElementById('ca-pw');const co=document.getElementById('ca-co');if(pw)pw.style.display=p?'flex':'none';if(co)co.style.display=!p?'flex':'none';}

function caDash(){
  const evs=[{name:'Annual Gala 2026',meta:'15 Mar 2026 · 48 sessions · Live',sc:'pg',col:'#1A237E'},{name:'Product Launch 2026',meta:'20 Mar 2026 · 0 sessions · Upcoming',sc:'pa',col:'#1B5E20'},{name:'Year-End Party 2025',meta:'Ended · 134 sessions',sc:'pgr',col:'#263238',dim:true}];
  return wframe('app.NAME.com/client',`
${caN('dash')}
<div class="wc">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;"><div><div class="h2">My Events</div><div class="mu" style="margin-top:2px;">Company A</div></div></div>
  <div class="g3" style="margin-bottom:20px;">
    ${[['2','Active'],['182','Sessions'],['4.7★','Avg Rating']].map(([v,l])=>`<div class="card" style="text-align:center;"><div style="font-size:22px;font-weight:700;">${v}</div><div class="lbl" style="margin:4px 0 0;">${l}</div></div>`).join('')}
  </div>
  ${evs.map(ev=>`
  <div data-name="${ev.name}" style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border:1.5px solid var(--bd);border-radius:9px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;${ev.dim?'opacity:.55':''}" onmouseover="this.style.borderColor='var(--bl)'" onmouseout="this.style.borderColor='var(--bd)'" onclick="openEvent('${ev.name}')">
    <div style="width:38px;height:38px;border-radius:9px;background:${ev.col};flex-shrink:0;"></div>
    <div style="flex:1;"><div style="font-size:12px;font-weight:700;">${ev.name}</div><div style="font-size:10px;color:var(--mu);font-family:var(--mn);margin-top:2px;">${ev.meta}</div></div>
    <span class="p ${ev.sc}">${ev.sc==='pg'?'Live':ev.sc==='pa'?'Upcoming':'Ended'}</span>
  </div>`).join('')}
</div>`);}

let caTab='details';

function openEvent(name){
  currentEvent = {name: name, isNew: name===''};
  showCA('setup', null);
}

function caSetup(){caTab='details';
const title = currentEvent.isNew ? 'New Event' : currentEvent.name;
return wframe('app.NAME.com/client/events/1/setup',`

function filterOv(btn,type,gridId){
  const par=btn.closest('[id]');

}

function caGifMode(m){
  const isSingle=m==='s';
  ['ca-gm-s','ca-gm-m'].forEach((id,i)=>{
    const el=$(id);if(!el)return;
    const isThis=(i===0&&isSingle)||(i===1&&!isSingle);
    el.style.border=`2px solid ${isThis?'var(--bl)':'var(--bd)'}`;
    el.style.background=isThis?'var(--bll)':'transparent';
    el.querySelector('div:last-child').textContent=isThis?'● SELECTED':'○ Click to select';
    el.querySelector('div:last-child').style.color=isThis?'var(--bl)':'var(--mu)';
  });
  $('ca-gs-s').style.display=isSingle?'flex':'none';
  $('ca-gs-m').style.display=!isSingle?'flex':'none';
}
