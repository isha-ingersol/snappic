<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NAME — Attendee View</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F4F3EF;--ink:#141412;--mu:#8A8A82;
  --bl:#2246D4;--bll:#EEF1FD;
  --gr:#1A7A42;--grl:#E8F5EE;
  --re:#C41C1C;--rel:#FDEAEA;
  --am:#B45309;--aml:#FDF5E6;
  --pu:#6D28D9;--pul:#F3EFFD;
  --or:#C2410C;--orl:#FDF0EB;
  --bd:#E2E1DC;--ca:#FFF;
  --dk:#0C0E1A;--dk2:#141828;
  --mn:'DM Mono',monospace;--sf:'Sora',sans-serif;
}
html,body{height:100%;}
body{font-family:var(--sf);color:var(--ink);background:var(--dk);display:flex;flex-direction:column;min-height:100svh;}

/* SHELL */
.shell{background:#080A14;border-bottom:1px solid #1A1F35;padding:0 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;height:42px;flex-shrink:0;}
.s-logo{font-family:var(--mn);font-size:11px;font-weight:500;color:#93C5FD;letter-spacing:.14em;flex-shrink:0;}

/* VIEW */
.view{display:flex;flex-direction:column;height:calc(100svh - 42px);}

/* SCREEN NAV */
.snav{background:#080A14;border-bottom:1px solid #1A1F35;padding:6px 12px;display:flex;gap:2px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;}
.snav::-webkit-scrollbar{display:none;}
.sn{font-family:var(--mn);font-size:8px;letter-spacing:.04em;padding:4px 8px;border-radius:4px;cursor:pointer;color:#475569;border:none;background:transparent;text-transform:uppercase;white-space:nowrap;transition:all .12s;}
.sn:hover{color:#94A3B8;background:#141828;}
.sn.on{background:#192D5A;color:#93C5FD;}
.snav .sep{width:1px;background:#1A1F35;margin:0 3px;flex-shrink:0;}

/* CANVASES */
.tcanvas{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:8px;background:#060810;}
.wcanvas{flex:1;overflow-y:auto;padding:14px;background:#0A0C18;display:flex;justify-content:flex-start;align-items:flex-start;}

/* IPAD */
.ipad{background:#1A1C28;border-radius:clamp(18px,4vw,36px);padding:clamp(6px,1.5vw,12px) clamp(5px,1.2vw,10px) clamp(8px,2vw,16px);box-shadow:0 0 0 1.5px #2A2D45,0 0 0 3px #12141E,0 28px 80px rgba(0,0,0,.95);position:relative;display:flex;flex-direction:column;width:min(390px,95vw,76.63svh);aspect-ratio:0.7663;flex-shrink:0;}
.ipad-cam{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:#2A2D45;}
.ipad-btn-r{position:absolute;right:-3px;top:110px;width:3px;height:44px;border-radius:0 3px 3px 0;background:#2A2D45;}
.ipad-btn-l1{position:absolute;left:-3px;top:88px;width:3px;height:28px;border-radius:3px 0 0 3px;background:#2A2D45;}
.ipad-btn-l2{position:absolute;left:-3px;top:126px;width:3px;height:44px;border-radius:3px 0 0 3px;background:#2A2D45;}
.ipad-scr{flex:1;background:#0D0F1E;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;margin-top:4px;min-height:0;}

/* WEB FRAME */
.wf{background:var(--ca);border:1.5px solid var(--bd);border-radius:10px;overflow:visible;width:100%;max-width:900px;box-shadow:0 4px 24px rgba(0,0,0,.14);}
.wch{background:#EDECEA;border-bottom:1px solid var(--bd);padding:7px 12px;display:flex;align-items:center;gap:8px;}
.dot{width:10px;height:10px;border-radius:50%;}
.dr{background:#FF5F57;}.dy{background:#FEBC2E;}.dg{background:#28C840;}
.wu{flex:1;background:#fff;border-radius:4px;padding:3px 10px;font-size:9px;font-family:var(--mn);color:var(--mu);}

/* ATOMS */
.wc{padding:20px;}
.h2{font-size:18px;font-weight:700;letter-spacing:-.02em;}
.h3{font-size:13px;font-weight:600;}
.mu{font-size:11px;color:var(--mu);line-height:1.5;}
.lbl{font-family:var(--mn);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--bd);border-radius:7px;padding:9px 12px;font-size:11px;color:var(--ink);font-family:var(--sf);outline:none;}
.inp::placeholder{color:var(--mu);}
.card{background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;padding:14px;}
.hr{height:1px;background:var(--bd);margin:12px 0;}
.upl{border:2px dashed var(--bd);border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;background:var(--bg);padding:16px;cursor:pointer;transition:all .15s;}
.upl:hover{border-color:var(--bl);background:var(--bll);}

/* PILLS */
.p{display:inline-flex;align-items:center;font-family:var(--mn);font-size:8px;padding:2px 7px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
.pb{background:var(--bll);color:var(--bl);border:1px solid #A5B4FC;}
.pg{background:var(--grl);color:var(--gr);border:1px solid #86EFAC;}
.pr{background:var(--rel);color:var(--re);border:1px solid #FCA5A5;}
.pa{background:var(--aml);color:var(--am);border:1px solid #FCD34D;}
.pp{background:var(--pul);color:var(--pu);border:1px solid #C4B5FD;}
.pgr{background:#F1F5F9;color:var(--mu);border:1px solid var(--bd);}
.po{background:var(--orl);color:var(--or);border:1px solid #FCA5A5;}

/* BTNS */
.btn{font-size:11px;font-weight:600;padding:9px 16px;border-radius:7px;background:var(--bl);color:#fff;cursor:pointer;transition:opacity .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:hover{opacity:.87;}
.bgh{background:transparent;border:1.5px solid var(--bd);color:var(--ink);}
.bgr{background:var(--gr);}
.bre{background:var(--re);}
.bfu{width:100%;}
.wbtn{font-size:10px;font-weight:600;padding:6px 13px;border-radius:6px;background:var(--bl);color:#fff;cursor:pointer;}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}

/* TABS */
.ptabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px;overflow-x:auto;gap:0;}
.ptabs::-webkit-scrollbar{display:none;}
.ptab{font-size:11px;font-weight:600;padding:8px 14px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s;}
.ptab.on{color:var(--bl);border-color:var(--bl);}

/* TOGGLE */
.tog{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);}
.tog:last-child{border-bottom:none;}
.tinf{flex:1;margin-right:12px;}
.tlbl{font-size:11px;font-weight:600;}
.tsub{font-size:10px;color:var(--mu);margin-top:2px;}
.sw{width:34px;height:20px;border-radius:10px;background:var(--bd);position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
.sw.on{background:var(--bl);}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.sw.on::after{transform:translateX(14px);}

/* FILTER */
.fp{font-family:var(--mn);font-size:9px;padding:4px 10px;border-radius:20px;cursor:pointer;border:1.5px solid var(--bd);color:var(--mu);background:transparent;transition:all .15s;white-space:nowrap;}
.fp.on{background:var(--bl);color:#fff;border-color:var(--bl);}

/* PHOTO ROW */
.pr-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1.5px solid var(--bd);border-radius:9px;margin-bottom:7px;cursor:pointer;transition:border-color .15s;}
.pr-row:hover{border-color:var(--bl);}
.pr-row.flag{border-color:var(--re);background:var(--rel);}
.thumb{width:46px;height:46px;border-radius:8px;flex-shrink:0;overflow:hidden;position:relative;}

/* TOAST & MODAL */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:11px;font-family:var(--mn);padding:9px 16px;border-radius:8px;z-index:9999;opacity:0;transition:opacity .28s;pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.on{opacity:1;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:5000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.mo.hid{display:none;}
.mb{background:#fff;border-radius:16px 16px 0 0;padding:22px;width:100%;max-width:500px;max-height:88svh;overflow-y:auto;position:relative;}
.mb.w{max-width:620px;}
@media(min-width:700px){.mo{align-items:center;padding:20px;}.mb{border-radius:16px;max-height:84svh;}}
.mc{position:absolute;top:12px;right:14px;font-size:20px;cursor:pointer;color:var(--mu);}

/* GIF */
@keyframes bf1{0%,14%{opacity:1;}16%,83%{opacity:0;}86%,98%{opacity:1;}100%{opacity:0;}}
@keyframes bf2{0%,15%{opacity:0;}17%,31%{opacity:1;}33%,68%{opacity:0;}70%,84%{opacity:1;}86%,100%{opacity:0;}}
@keyframes bf3{0%,32%{opacity:0;}34%,48%{opacity:1;}50%,53%{opacity:0;}55%,69%{opacity:1;}71%,100%{opacity:0;}}
@keyframes bf4{0%,49%{opacity:0;}51%,64%{opacity:1;}66%,100%{opacity:0;}}
@keyframes countPop{0%{opacity:0;transform:scale(.5);}25%{opacity:1;transform:scale(1.05);}85%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(.3);}}
@keyframes pulseRing{0%{transform:scale(1);opacity:.5;}100%{transform:scale(1.35);opacity:0;}}
@keyframes flash{0%,100%{opacity:0;}40%,60%{opacity:1;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes spinY{from{transform:rotateY(0deg);}to{transform:rotateY(360deg);}}

/* UTIL */
.code{background:var(--ink);border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.codeval{font-family:var(--mn);font-size:14px;font-weight:500;color:#fff;letter-spacing:.18em;}
.codeact{font-family:var(--mn);font-size:9px;color:#93C5FD;cursor:pointer;padding:2px 6px;border-radius:3px;}
.codeact:hover{background:rgba(255,255,255,.1);}
</style>
</head>
<body>

<!-- SHELL (minimal, just for context) -->
<div class="shell">
  <div class="s-logo">NAME · ATTENDEE</div>
</div>

<!-- ATTENDEE VIEW -->
<div class="view on">
  <div class="tcanvas" id="av-c"></div>
</div>

<div class="toast" id="toast"></div>
<div class="mo hid" id="mo" onclick="closeMbg(event)">
  <div class="mb" id="mb" style="position:relative;"></div>
</div>

<script>
/* ── GLOBALS ── */
const FC=['#1A237E','#991B1B','#92400E','#14532D'];
const FL=['Midnight Blue','Crimson Red','Amber Gold','Forest Green'];
let gifPhase=0, gifTmr=null, r360Phase=0, aiPhase=0, stillPhase=0;

/* ── UTILS ── */
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2300);}
function openM(h,wide=false){const b=$('mb');b.className='mb'+(wide?' w':'');b.innerHTML=h;$('mo').classList.remove('hid');}
function closeM(){$('mo').classList.add('hid');}
function closeMbg(e){if(e.target===$('mo'))closeM();}
function tog(el){el.classList.toggle('on');}

function ipad(c){
  return `<div class="ipad"><div class="ipad-cam"></div><div class="ipad-btn-r"></div><div class="ipad-btn-l1"></div><div class="ipad-btn-l2"></div><div class="ipad-scr">${c}</div></div>`;
}
function wframe(url,c){
  return `<div class="wf"><div class="wch"><div style="display:flex;gap:4px;"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div><div class="wu">${url}</div></div>${c}</div>`;
}
function stars(r=0,sz=12){
  return `<div style="display:flex;gap:2px;">${[1,2,3,4,5].map(n=>`<svg width="${sz}" height="${sz}" viewBox="0 0 20 20" fill="${n<=r?'#F59E0B':'#D1D5DB'}"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`).join('')}</div>`;
}
function iStars(id){
  return `<div id="st-${id}" style="display:flex;gap:5px;">${[1,2,3,4,5].map(n=>`<div onclick="rateStar('${id}',${n})" style="cursor:pointer;width:28px;height:28px;"><svg viewBox="0 0 20 20" id="sv-${id}-${n}" fill="#D1D5DB" style="transition:fill .15s;"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg></div>`).join('')}</div>`;
}
function rateStar(id,n){for(let i=1;i<=5;i++)document.getElementById(`sv-${id}-${i}`)?.setAttribute('fill',i<=n?'#F59E0B':'#D1D5DB');toast(`Rated ${n} ⭐`);}

/* ── ATTENDEE VIEW ── */
function showAV(s,btn){
  if(s!=='cap_ai'){aiPhase=0;}
  if(s!=='cap_still'){stillPhase=0;}
  if(s!=='cap_360'){r360Phase=0;}
  if(gifTmr){clearInterval(gifTmr);gifTmr=null;}
  document.querySelectorAll('.sn').forEach(b=>b.classList.remove('on'));
  btn?.classList.add('on');
  renderAV(s);
}
function renderAV(s){
  const c=$('av-c');if(!c)return;
  const m={attract:avAttract,experience:avExp,cap_still:avCapStill,cap_gif:avCapGif,cap_ai:avCapAI,cap_360:avCap360,prev_still:avPrevStill,prev_gif:avPrevGif,prev_ai:avPrevAI,prev_360:avPrev360,share:avShare};
  c.innerHTML=(m[s]||avAttract)();
}

/* 1. ATTRACT */
function avAttract(){return ipad(`
<div style="flex:1;background:linear-gradient(148deg,#08091A 0%,#0F1847 55%,#08091A 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;position:relative;cursor:pointer;overflow:hidden;" onclick="showAV('experience',document.querySelector('.sn:nth-child(2)'))">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 38%,rgba(34,70,212,.38),transparent 62%);pointer-events:none;"></div>
  <div style="display:flex;align-items:center;gap:14px;z-index:1;">
    <div style="width:56px;height:56px;background:rgba(255,255,255,.1);border-radius:14px;border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;font-family:var(--mn);color:#fff;">CA</div>
    <div><div style="font-size:28px;font-weight:800;color:#fff;letter-spacing:-.03em;line-height:1.1;">Annual Gala 2026</div><div style="font-size:12px;color:rgba(255,255,255,.38);font-family:var(--mn);margin-top:4px;">Company A · Powered by NAME</div></div>
  </div>
  <div style="width:200px;height:1px;background:rgba(255,255,255,.1);"></div>
  <div style="text-align:center;z-index:1;">
    <div style="font-size:20px;font-weight:600;color:rgba(255,255,255,.9);">Tap anywhere to begin ✨</div>
    <div style="font-size:11px;color:rgba(255,255,255,.28);font-family:var(--mn);margin-top:6px;">AI-powered photo booth</div>
  </div>
</div>`);}

/* 2. EXPERIENCE */
function avExp(){
  const modes=[
    {s:'cap_still',icon:'📷',lbl:'Still Photo',sub:'Single capture + AI transform',col:'var(--bll)',tc:'var(--bl)'},
    {s:'cap_gif',icon:'🎞',lbl:'GIF ',sub:'4 frames · loops forever',col:'var(--grl)',tc:'var(--gr)'},
    {s:'cap_ai',icon:'✨',lbl:'AI Transformation',sub:'Single photo → animated reveal',col:'var(--pul)',tc:'var(--pu)'},
    {s:'cap_360',icon:'🌐',lbl:'360° Video',sub:'Immersive rotating capture',col:'var(--orl)',tc:'var(--or)'},
  ];
  return ipad(`
<div style="flex:1;display:flex;flex-direction:column;background:var(--bg);">
  <div style="background:#fff;border-bottom:1px solid var(--bd);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;">
    <div><div style="font-size:16px;font-weight:700;">Choose your experience</div><div style="font-size:11px;color:var(--mu);margin-top:2px;">Annual Gala 2026</div></div>
    <div style="font-size:10px;font-family:var(--mn);color:var(--mu);cursor:pointer;border:1px solid var(--bd);padding:3px 9px;border-radius:5px;" onclick="showAV('attract',null)">EXIT</div>
  </div>
  <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px;">
    ${modes.map(m=>`
    <div style="background:#fff;border:2px solid var(--bd);border-radius:14px;padding:18px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;transition:all .18s;" onmouseover="this.style.borderColor='${m.tc}';this.style.background='${m.col}'" onmouseout="this.style.borderColor='var(--bd)';this.style.background='#fff'" onclick="showAV('${m.s}',null)">
      <div style="width:52px;height:52px;border-radius:12px;background:${m.col};display:flex;align-items:center;justify-content:center;font-size:22px;">${m.icon}</div>
      <div style="font-size:13px;font-weight:700;color:${m.tc};">${m.lbl}</div>
      <div style="font-size:10px;color:var(--mu);">${m.sub}</div>
    </div>`).join('')}
  </div>
</div>`);}

/* 3a. STILL CAPTURE */
function avCapStill(){stillPhase=0;return ipad(`
<div style="flex:1;display:flex;flex-direction:column;background:#0D0F1E;overflow:hidden;">
  <div style="flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;">
    <div style="position:absolute;inset:0;background:linear-gradient(170deg,#0a0c1e,#111830);"></div>
    <div style="position:relative;z-index:2;width:110px;height:180px;border:2px dashed rgba(255,255,255,.2);border-radius:55px 55px 36px 36px;display:flex;align-items:center;justify-content:center;">
      <svg width="42" height="58" viewBox="0 0 60 80" fill="none"><circle cx="30" cy="18" r="14" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/><path d="M6 76c0-13.255 10.745-24 24-24s24 10.745 24 24" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
    <div style="position:absolute;inset:0;border:2px solid rgba(255,215,0,.12);pointer-events:none;z-index:3;"></div>
    <div style="position:absolute;top:10px;left:12px;font-size:9px;font-family:var(--mn);color:rgba(255,255,255,.38);z-index:3;">LIVE</div>
    <div style="position:absolute;top:10px;right:12px;background:rgba(34,70,212,.35);border:1px solid rgba(34,70,212,.55);border-radius:5px;padding:2px 9px;font-size:9px;font-family:var(--mn);color:#93C5FD;z-index:3;">⏱ 3s</div>
    <div id="still-cd" style="position:absolute;font-size:120px;font-weight:800;color:rgba(255,255,255,.2);font-family:var(--mn);pointer-events:none;z-index:5;display:none;top:50%;left:50%;transform:translate(-50%,-50%);"></div>
    <div id="still-fl" style="position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:6;"></div>
    <div id="still-done" style="position:absolute;inset:0;background:linear-gradient(155deg,#0D1F3C,#1A3A6E);opacity:0;pointer-events:none;z-index:4;display:flex;align-items:center;justify-content:center;">
      <div style="text-align:center;"><div style="font-size:22px;margin-bottom:8px;">📷</div><div style="font-size:13px;font-weight:700;color:#fff;">Photo captured!</div></div>
    </div>
  </div>
  <div style="background:var(--bg);border-top:1px solid var(--bd);padding:10px 16px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;flex-shrink:0;gap:8px;">
    <div><div class="lbl" style="margin-bottom:3px;">Still Photo</div><div style="font-size:9px;color:var(--mu);font-family:var(--mn);">Time: 3s</div></div>

function capFrame(n){
  if(n>4){gifAllDone();return;}
  const badge=$('gif-badge');
  badge.textContent=`CAPTURING F${n}`;badge.style.display='block';
  for(let i=1;i<=4;i++){
    const d=$('fd'+i);if(!d)return;
    d.style.background=i<n?FC[i-1]:i===n?'rgba(255,255,255,.18)':'transparent';

    d.style.color=i<=n?'#fff':'#334155';
  }
  for(let i=0;i<4;i++){const bg=$('gfbg'+i);if(bg)bg.style.opacity=i===n-1?'1':'0';}
  const lbl=$('gif-lbl');if(lbl)lbl.textContent=`Frame ${n} of 4 — ${FL[n-1]}`;
  countdown(3,()=>{
    const fl=$('gif-fl');
    if(fl){fl.style.transition='opacity .05s';fl.style.opacity='1';setTimeout(()=>{fl.style.transition='opacity .3s';fl.style.opacity='0';},80);}
    const th=$('gth'+n);
    if(th){th.style.background=FC[n-1];th.style.borderColor='var(--bl)';th.style.color='rgba(255,255,255,.7)';th.textContent='F'+n;}
    const st=$('gif-status');if(st)st.textContent=`${n} of 4`;
    gifPhase=n;
    setTimeout(()=>capFrame(n+1),420);
  });
}
function countdown(from,done){
  let t=from;
  const cd=$('gif-cd');if(!cd)return;
  cd.style.display='block';
  function tick(){
    cd.style.animation='none';void cd.offsetWidth;
    cd.style.animation='countPop .9s ease-out forwards';
    cd.textContent=t;
    if(t===0){setTimeout(()=>{cd.style.display='none';done();},300);}
    else{t--;setTimeout(tick,900);}
  }
  tick();
}
function cdGeneric(elemId,from,done){
  let t=from;
  const cd=$(elemId);if(!cd)return;
  cd.style.display='block';
  function tick(){
    cd.style.animation='none';void cd.offsetWidth;
    cd.style.animation='countPop .9s ease-out forwards';
    cd.textContent=t;
    if(t===0){setTimeout(()=>{cd.style.display='none';done();},300);}
    else{t--;setTimeout(tick,900);}
  }
  tick();
}

function start360cap(){
  if(r360Phase>0)return; r360Phase=1;
  const sh=document.getElementById('r360-shutter');
  if(sh){sh.style.opacity='.35';sh.style.pointerEvents='none';}
  const lbl=document.getElementById('r360-lbl');
  if(lbl)lbl.textContent='Pose!';
  cdGeneric('r360-cd',3,()=>{
    setTimeout(()=>{
      const sh2=document.getElementById('r360-shutter');
      if(sh2){
        sh2.style.background='var(--gr)';sh2.style.opacity='1';sh2.style.pointerEvents='auto';
        sh2.style.boxShadow='0 4px 20px rgba(26,122,66,.4)';
        sh2.innerHTML='<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L19 7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        sh2.onclick=()=>showAV('prev_360',null);
      }
      const lbl2=document.getElementById('r360-lbl');
      r360Phase=2;
    },300);
  });
}
